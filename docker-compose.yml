version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: epai-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-Millonarios985*}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Auto-initialization

  backend:
    build: .
    container_name: epai-backend
    restart: always
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./data:/app/data
      - ./models:/app/models # Mount local models for offline mode
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-Millonarios985*}
      - DB_NAME=${DB_NAME:-postgres}

volumes:
  postgres_data:
